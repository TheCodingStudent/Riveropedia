<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secreto</title>
    <link rel="stylesheet" href="/Riveropedia/css/style.css">
    <link rel="stylesheet" href="/Riveropedia/css/poema.css">
    <style>
        #contenido {
            min-height: 360px;
            height: auto;
            padding: 0;
            white-space: normal;
        }
        .robar { cursor: pointer; transition: .3s; }
        .robar:hover { text-shadow: 0 0 10px #d6336c; }
        .robada, .letra-robada { color: transparent; }
        .robada { pointer-events: none; }
        .letra-robada { transition: .4s; }
        .letra-robada.revelada { color: #d6336c; }
        .resaltada { position: relative; display: inline; transition: color 0.3s ease; }
        .resaltada:hover { color: orange; cursor: pointer; text-decoration: underline; }
        .resaltada::selection, .oculto::selection { color: white; text-decoration: underline; text-decoration-color: red; }
        em::selection { font-style: italic; color: #d6336c; }
        .resaltada::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            visibility: hidden;
            opacity: 0;
            z-index: 10;
            font-size: 16px;
            white-space: pre;
            text-align: center;
        }
        .resaltada:hover::after { visibility: visible; opacity: 1; }
        .oculto { color: transparent; user-select: text; }
        .arcoiris-letra {
            display: inline-block;
            color: inherit;
            transition: color .22s ease, text-shadow .22s ease, transform .22s ease;
        }
        .arcoiris-letra:hover {
            color: var(--arcoiris-color);
            text-shadow: 0 0 12px color-mix(in srgb, var(--arcoiris-color) 55%, transparent);
            transform: translateY(-1px);
        }
        .arcoiris-letra::selection {
            color: var(--arcoiris-color);
            background: rgba(255, 255, 255, .22);
            text-shadow: none;
        }
    </style>
</head>

<body>
    <main class="poema-container">
        <article class="poema-card">
            <span class="poema-fecha" id="clave"></span>
            <h2 id="titulo">Cargando...</h2>
            <div class="poema-texto" id="contenido">
                <p>Buscando secreto...</p>
            </div>
        </article>
    </main>

    <script src="/Riveropedia/js/layout.js"></script>
    <script src="/Riveropedia/js/poemas.js"></script>
    <script src="/Riveropedia/js/secretos.js"></script>
    <script src="/Riveropedia/js/script.js"></script>
    <script src="/Riveropedia/js/secreto_page.js"></script>
</body>

</html>
