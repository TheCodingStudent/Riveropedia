<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secreto</title>
    <link rel="stylesheet" href="/Riveropedia/css/style.css">
    <link rel="stylesheet" href="/Riveropedia/css/poema.css">
    <style>
        .robar {
            cursor: pointer;
            /* color: orange; */
            /* font-weight: bold; */
            transition: .3s;
        }

        .robar:hover {
            text-shadow: 0 0 10px #d6336c;
        }

        .robada {
            color: transparent;
            pointer-events: none;
        }

        .letra-robada {
            color: transparent;
            transition: .4s;
        }

        .letra-robada.revelada {
            color: #d6336c;
        }

        .resaltada {
            position: relative;
            display: inline;
            transition: color 0.3s ease;
        }

        .resaltada:hover {
            color: orange;
            cursor: pointer;
            text-decoration: underline;
        }

        .resaltada::selection {
            color: white;
            text-decoration: underline;
            text-decoration-color: red;
        }

        em::selection {
            font-style: italic;
            color: #d6336c;
        }

        .resaltada::after {
            content: attr(data-tooltip);

            font-size: 16px;
            white-space: pre;

            visibility: hidden;
            opacity: 0;

            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);

            text-align: center;
        }

        .resaltada:hover::after {
            visibility: visible;
            opacity: 1;
        }

        .oculto {
            color: transparent;
            user-select: text;
        }

        .oculto::selection {
            color: white;
            text-decoration: underline;
            text-decoration-color: red;
        }
    </style>
</head>

<body>
    <nav class="topbar">
        <div class="topbar-section left">
            <form id="busqueda-form">
                <input type="text" id="busqueda" placeholder="Buscar..." autocomplete="off">
            </form>
        </div>
        <div class="topbar-section center">
            <h1 class="titulo tooltip">
                ♡ N.I.N.A
                <span class="tooltiptext">
                    Neural Interface for Noble Affection
                </span>
            </h1>
        </div>
        <div class="topbar-section right">
            <ul>
                <li><a href="/Riveropedia/index.html">Inicio</a></li>
                <li><a href="/Riveropedia/info/sobre-ti.html">Sobre ti</a></li>
            </ul>
        </div>
    </nav>

    <main class="poema-container">
        <article class="poema-card">
            <span class="poema-fecha" id="clave"></span>
            <h2 id="titulo">Cargando...</h2>
            <div class="poema-texto" id="contenido">
                <p>Buscando secreto...</p>
            </div>
        </article>
    </main>

    <footer>
        <p>© 2026 A. Ssshparro</p>
    </footer>

    <script src="/Riveropedia/js/poemas.js"></script>
    <script src="/Riveropedia/js/secretos.js"></script>
    <script src="/Riveropedia/js/script.js"></script>

    <script>
        const params = new URLSearchParams(window.location.search);
        const clave = params.get("clave");

        function resaltarLetraConTooltip(texto, indices, tooltips) {
            const chars = texto.split("");

            indices.forEach((i, idx) => {
                if (i >= 0 && i < chars.length) {
                    chars[i] =
                        `<span class="resaltada" data-tooltip="${tooltips[idx]}">${chars[i]}</span>`;
                }
            });

            return chars.join("");
        }

        function ocultarTitulo(titulo, letras) {

            const conjunto =
                Array.isArray(letras)
                    ? letras.map(l => l.toLowerCase())
                    : [...letras.toLowerCase()];

            return titulo
                .split("")
                .map(c =>
                    conjunto.includes(c.toLowerCase())
                        ? `<span class="letra-robada" data-letra="${c.toLowerCase()}">${c}</span>`
                        : c
                )
                .join("");
        }

        function marcarRobables(html, letras) {

            const conjunto =
                Array.isArray(letras)
                    ? letras.map(l => l.toLowerCase())
                    : [...letras.toLowerCase()];

            let resultado = "";
            let dentroTag = false;

            for (const c of html) {

                if (c === "<") dentroTag = true;

                if (
                    !dentroTag &&
                    conjunto.includes(c.toLowerCase())
                ) {
                    resultado +=
                        `<span class="robar" data-letra="${c.toLowerCase()}">${c}</span>`;
                }
                else {
                    resultado += c;
                }

                if (c === ">") dentroTag = false;
            }

            return resultado;
        }

        if (!clave || !secretos[clave]) {

            document.getElementById("titulo").textContent =
                "Secreto no encontrado";

            document.getElementById("contenido").innerHTML =
                "<p>No existe ningún secreto asociado a esta clave.</p>";

        } else {

            const secreto = secretos[clave];

            document.title = secreto.titulo;
            document.getElementById("clave").textContent = clave;

            const tituloResaltado = resaltarLetraConTooltip(
                secreto.titulo,
                Array.isArray(secreto.index)
                    ? secreto.index
                    : [secreto.index],
                Array.isArray(secreto.tooltip)
                    ? secreto.tooltip
                    : [secreto.tooltip]
            );

            let tituloFinal = tituloResaltado;
            let contenidoFinal = secreto.contenido;

            if (secreto.robar) {

                tituloFinal =
                    ocultarTitulo(
                        tituloFinal,
                        secreto.robar
                    );

                contenidoFinal =
                    marcarRobables(
                        contenidoFinal,
                        secreto.robar
                    );
            }

            document.getElementById("titulo").innerHTML =
                tituloFinal;

            document.getElementById("contenido").innerHTML =
                contenidoFinal;
        }

        document.addEventListener("click", e => {

            if (!e.target.classList.contains("robar")) {
                return;
            }

            const letra =
                e.target.dataset.letra;

            e.target.classList.add("robada");

            const objetivo =
                document.querySelector(
                    `.letra-robada[data-letra="${letra}"]:not(.revelada)`
                );

            if (objetivo) {
                objetivo.classList.add("revelada");
            }
        });
    </script>

</body>

</html>
