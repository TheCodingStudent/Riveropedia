<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secreto</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body>
    <nav class="topbar">
        <div class="topbar-section left">
            <form id="busqueda-form">
                <input type="text" id="busqueda" placeholder="Buscar..." autocomplete="off">
            </form>
        </div>
        <div class="topbar-section center">
            <h1 class="titulo tooltip">
                ♡ N.I.N.A
                <span class="tooltiptext">
                    Neural Interface for Noble Affection
                </span>
            </h1>
        </div>
        <div class="topbar-section right">
            <ul>
                <li>
                    <a href="../index.html">
                        Inicio
                    </a>
                </li>
                <li>
                    <a href="../info/sobre-ti.html">
                        Sobre ti
                    </a>
                </li>
            </ul>
        </div>
    </nav>

    <main class="poema-container">
        <article class="poema-card">
            <span class="poema-fecha" id="clave"></span>
            <h2 id="titulo">Cargando...</h2>
            <div class="poema-texto" id="contenido">
                <p>Buscando secreto...</p>
            </div>
        </article>
    </main>

    <footer>
        <p>© 2026 A. Ssshparro</p>
    </footer>

    <script src="../js/secretos.js"></script>

    <script>

        const params =
            new URLSearchParams(
                window.location.search
            );

        const clave =
            params.get("clave");

        if (
            !clave ||
            !secretos[clave]
        ) {

            document.getElementById(
                "titulo"
            ).textContent =
                "Secreto no encontrado";

            document.getElementById(
                "contenido"
            ).innerHTML =
                "<p>No existe ningún secreto asociado a esta clave.</p>";

        } else {

            const secreto =
                secretos[clave];

            document.title =
                secreto.titulo;

            document.getElementById(
                "clave"
            ).textContent =
                clave;

            document.getElementById(
                "titulo"
            ).textContent =
                secreto.titulo;

            document.getElementById(
                "contenido"
            ).innerHTML =
                secreto.contenido;
        }

    </script>

</body>

</html>
