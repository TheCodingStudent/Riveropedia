<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secreto</title>
    <link rel="stylesheet" href="/Riveropedia/style.css">
    <style>
        .resaltada {
            position: relative;
            display: inline;
            transition: color 0.3s ease;
        }

        .resaltada:hover {
            color: orange;
            cursor: pointer;
            text-decoration: underline;
        }

        /* Tooltip usando pseudo-elemento */
        .resaltada::after {
            content: attr(data-tooltip);
            visibility: hidden;
            opacity: 0;
            font-size: 0.4em;
            /* background-color: #333; */
            color: #d6336c;
            text-align: center;
            /* border-radius: 6px; */
            /* padding: 5px; */
            position: absolute;
            bottom: 100%;
            /* arriba de la letra */
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            transition: opacity 0.3s;
            z-index: 1;
        }

        .resaltada:hover::after {
            visibility: visible;
            opacity: 1;
        }
    </style>
</head>

<body>
    <nav class="topbar">
        <div class="topbar-section left">
            <form id="busqueda-form">
                <input type="text" id="busqueda" placeholder="Buscar..." autocomplete="off">
            </form>
        </div>
        <div class="topbar-section center">
            <h1 class="titulo tooltip">
                ♡ N.I.N.A
                <span class="tooltiptext">
                    Neural Interface for Noble Affection
                </span>
            </h1>
        </div>
        <div class="topbar-section right">
            <ul>
                <li><a href="/Riveropedia/index.html">Inicio</a></li>
                <li><a href="/Riveropedia/info/sobre-ti.html">Sobre ti</a></li>
            </ul>
        </div>
    </nav>

    <main class="poema-container">
        <article class="poema-card">
            <span class="poema-fecha" id="clave"></span>
            <h2 id="titulo">Cargando...</h2>
            <div class="poema-texto" id="contenido">
                <p>Buscando secreto...</p>
            </div>
        </article>
    </main>

    <footer>
        <p>© 2026 A. Ssshparro</p>
    </footer>

    <script src="/Riveropedia/js/poemas.js"></script>
    <script src="/Riveropedia/js/secretos.js"></script>
    <script src="/Riveropedia/js/script.js"></script>

    <script>
        const params = new URLSearchParams(window.location.search);
        const clave = params.get("clave");

        function resaltarLetraConTooltip(texto, indice, tooltip) {
            const chars = texto.split("");
            if (indice >= 0 && indice < chars.length) {
                // Solo la letra envuelta en span con data-tooltip
                chars[indice] = `<span class="resaltada" data-tooltip="${tooltip}">${chars[indice]}</span>`;
            }
            return chars.join("");
        }

        if (!clave || !secretos[clave]) {
            document.getElementById("titulo").textContent = "Secreto no encontrado";
            document.getElementById("contenido").innerHTML =
                "<p>No existe ningún secreto asociado a esta clave.</p>";
        } else {
            const secreto = secretos[clave];
            document.title = secreto.titulo;
            document.getElementById("clave").textContent = clave;

            const tituloResaltado = resaltarLetraConTooltip(
                secreto.titulo,
                secreto.index,
                secreto.tooltip
            );
            document.getElementById("titulo").innerHTML = tituloResaltado;

            document.getElementById("contenido").innerHTML =
                secreto.contenido.replace(/\n/g, "<br>");
        }
    </script>



</body>

</html>
