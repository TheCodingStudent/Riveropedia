<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secreto</title>
    <link rel="stylesheet" href="/Riveropedia/css/style.css">
    <link rel="stylesheet" href="/Riveropedia/css/poema.css">
    <style>
        .resaltada {
            position: relative;
            display: inline;
            transition: color 0.3s ease;
        }

        .resaltada:hover {
            color: orange;
            cursor: pointer;
            text-decoration: underline;
        }

        .resaltada::selection {
            color: white;
            text-decoration: underline;
            text-decoration-color: red;
        }

        em::selection {
            font-style: italic;
            color: #d6336c;
        }

        .resaltada::after {
            content: attr(data-tooltip);
            visibility: hidden;
            opacity: 0;
            font-size: 0.4em;
            color: #d6336c;
            text-align: center;
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            transition: opacity 1s;
            z-index: 1;
        }

        .resaltada:hover::after {
            visibility: visible;
            opacity: 1;
        }

        .oculto {
            color: transparent;
            user-select: text;
        }

        .oculto::selection {
            color: white;
            text-decoration: underline;
            text-decoration-color: red;
        }
    </style>
</head>

<body>
    <nav class="topbar">
        <div class="topbar-section left">
            <form id="busqueda-form">
                <input type="text" id="busqueda" placeholder="Buscar..." autocomplete="off">
            </form>
        </div>
        <div class="topbar-section center">
            <h1 class="titulo tooltip">
                ♡ N.I.N.A
                <span class="tooltiptext">
                    Neural Interface for Noble Affection
                </span>
            </h1>
        </div>
        <div class="topbar-section right">
            <ul>
                <li><a href="/Riveropedia/index.html">Inicio</a></li>
                <li><a href="/Riveropedia/info/sobre-ti.html">Sobre ti</a></li>
            </ul>
        </div>
    </nav>

    <main class="poema-container">
        <article class="poema-card">
            <span class="poema-fecha" id="clave"></span>
            <h2 id="titulo">Cargando...</h2>
            <div class="poema-texto" id="contenido">
                <p>Buscando secreto...</p>
            </div>
        </article>
    </main>

    <footer>
        <p>© 2026 A. Ssshparro</p>
    </footer>

    <script src="/Riveropedia/js/poemas.js"></script>
    <script src="/Riveropedia/js/secretos.js"></script>
    <script src="/Riveropedia/js/script.js"></script>

    <script>
        const params = new URLSearchParams(window.location.search);
        const clave = params.get("clave");

        function resaltarLetraConTooltip(texto, indices, tooltips) {
            const chars = texto.split("");
            indices.forEach((i, idx) => {
                if (i >= 0 && i < chars.length) {
                    chars[i] = `<span class="resaltada" data-tooltip="${tooltips[idx]}">${chars[i]}</span>`;
                }
            });
            return chars.join("");
        }


        if (!clave || !secretos[clave]) {
            document.getElementById("titulo").textContent = "Secreto no encontrado";
            document.getElementById("contenido").innerHTML =
                "<p>No existe ningún secreto asociado a esta clave.</p>";
        } else {
            const secreto = secretos[clave];
            document.title = secreto.titulo;
            document.getElementById("clave").textContent = clave;

            const tituloResaltado = resaltarLetraConTooltip(
                secreto.titulo,
                Array.isArray(secreto.index) ? secreto.index : [secreto.index],
                Array.isArray(secreto.tooltip) ? secreto.tooltip : [secreto.tooltip]
            );
            document.getElementById("titulo").innerHTML = tituloResaltado;

            document.getElementById("contenido").innerHTML = secreto.contenido
        }
    </script>

</body>

</html>
