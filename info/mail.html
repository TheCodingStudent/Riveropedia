<div style="
    font-family: Arial, Helvetica, sans-serif;
    max-width: 600px;
    margin: 0 auto;
    background: #fff7fa;
    border: 1px solid #ffd6e5;
    border-radius: 20px;
    padding: 28px;
    color: #2f1f26;
">

    <!-- Encabezado -->
    <div style="text-align:center; margin-bottom:24px;">
        <div style="
            color:#ff4f87;
            font-size:24px;
            font-weight:bold;
            letter-spacing:3px;
        ">
            ♡ N.I.N.A
        </div>

        <div style="
            color:#7a6670;
            font-size:13px;
            margin-top:6px;
        ">Neural Interface for Noble Affection
        </div>
    </div>

    <!-- Tarjeta principal -->
    <div style="
        background:#ffffff;
        border:1px solid #ffe1ec;
        border-radius:16px;
        padding:24px;
    ">
        <table role="presentation" cellpadding="0" cellspacing="0" width="100%">
            <tr>
                <td width="60" valign="top">
                    <div style="
                        width:48px;
                        height:48px;
                        line-height:48px;
                        text-align:center;
                        background:#ffe6f0;
                        border-radius:50%;
                        font-size:24px;
                    ">💌
                    </div>
                </td>

                <td valign="top">
                    <div style="
                        color:#ff4f87;
                        font-size:18px;
                        font-weight:bold;
                    ">{{name}}
                    </div>

                    <div style="
                        color:#b78398;
                        font-size:12px;
                        margin-top:4px;
                    ">{{time}}
                    </div>
                </td>
            </tr>
        </table>

        <div style="
            margin-top:20px;
            border-top:1px solid #ffe1ec;
            padding-top:20px;
            font-size:15px;
            line-height:1.8;
            color:#2f1f26;
            white-space:pre-wrap;
        ">{{message}}
        </div>

    </div>

    <!-- Footer -->
    <div style="
        text-align:center;
        margin-top:20px;
        color:#7a6670;
        font-size:12px;
    ">Este mensaje fue enviado desde Riveropedia ♡
    </div>
</div>
