<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Poema</title>
    <link rel="stylesheet" href="/Riveropedia/css/style.css">
    <link rel="stylesheet" href="/Riveropedia/css/poema.css">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script>(function () { emailjs.init("keJJLe8j0STrmJjvm"); })();</script>

</head>

<body>
    <nav class="topbar">
        <div class="topbar-section left">
            <form id="busqueda-form">
                <input type="text" id="busqueda" placeholder="Buscar..." autocomplete="off">
                <ul id="sugerencias"></ul>
            </form>
        </div>

        <div class="topbar-section center">
            <h1 class="titulo tooltip">
                ♡ N.I.N.A
                <span class="tooltiptext">
                    Neural Interface for Noble Affection
                </span>
            </h1>
        </div>

        <div class="topbar-section right">
            <ul>
                <li><a href="/Riveropedia/index.html">Inicio</a></li>
                <li><a href="/Riveropedia/info/sobre-ti.html">Sobre ti</a></li>
            </ul>
        </div>
    </nav>

    <main class="poema-container">
        <article class="poema-card">
            <span class="poema-fecha" id="poema-fecha"></span>
            <h2 id="poema-titulo"></h2>
            <div class="poema-texto" id="poema-texto"></div>
            <div class="firma" id="poema-firma"></div>
        </article>

        <article class="poema-card">
            <h2>Enviar un mensaje</h2>
            <form id="form">
                <input type="text" name="name" placeholder="Tu nombre" required>
                <input type="email" name="email" placeholder="Tu correo">
                <input type="text" name="title" placeholder="Asunto">
                <textarea name="message" placeholder="Escribe tu mensaje aquí..." required></textarea>
                <input type="hidden" name="time" id="time">
                <button type="submit">Enviar</button>
            </form>
        </article>
    </main>

    <footer>
        <p>© 2026 A. Ssshparro</p>
    </footer>

    <script src="/Riveropedia/js/poemas.js"></script>
    <script src="/Riveropedia/js/secretos.js"></script>
    <script src="/Riveropedia/js/script.js"></script>

    <script>

        const fecha = new URLSearchParams(location.search).get("fecha");
        const poema = poemas[fecha];

        const $ = id => document.getElementById(id);

        const puedeAbrirse = fechaISO => {

            const [y, m, d] = fechaISO.split("-").map(Number);

            const fechaPoema = new Date(y, m - 1, d);

            const hoy = new Date();
            hoy.setHours(0, 0, 0, 0);

            return fechaPoema <= hoy;
        };

        const envolverLetras = (html, letras) => {

            let dentroTag = false;
            let resultado = "";

            for (const c of html) {

                if (c === "<") dentroTag = true;

                resultado += (
                    !dentroTag &&
                    letras.some(
                        l => l.toLowerCase() === c.toLowerCase()
                    )
                )
                    ? `<span class="oculto-tecla">${c}</span>`
                    : c;

                if (c === ">") dentroTag = false;
            }

            return resultado;
        };

        const aplicarMask = (el, textoReal) => {

            const textoVisible = el.textContent;

            el.classList.add("mask-container");

            el.innerHTML = `
            <span class="mask-falso">
                ${textoVisible}
            </span>

            <span class="mask-real">
                ${textoReal}
            </span>
        `;

            const real =
                el.querySelector(".mask-real");

            el.addEventListener("mousemove", e => {

                const rect =
                    el.getBoundingClientRect();

                const x =
                    e.clientX - rect.left;

                const y =
                    e.clientY - rect.top;

                const radio =
                    rect.height * 0.5;

                real.style.setProperty(
                    "--mx",
                    `${x}px`
                );

                real.style.setProperty(
                    "--my",
                    `${y}px`
                );

                real.style.setProperty(
                    "--radio",
                    `${radio}px`
                );

                real.style.clipPath =
                    `circle(${radio}px at ${x}px ${y}px)`;
            });

            el.addEventListener("mouseleave", () => {

                real.style.clipPath =
                    "circle(0px at 0px 0px)";
            });
        };

        if (!puedeAbrirse(fecha)) {

            location.replace(
                "/Riveropedia/info/tramposa.html?fecha=" +
                encodeURIComponent(fecha)
            );

        } else if (!poema) {

            location.href =
                "/Riveropedia/info/pendiente.html";

        } else {

            document.title =
                poema.titulo;

            $("poema-fecha").textContent =
                poema.fecha;

            $("poema-titulo").textContent =
                poema.titulo;

            let html =
                poema.estrofas
                    .map(
                        e => `<p>${e.join("<br>")}</p>`
                    )
                    .join("");

            if (poema.ocultar) {

                html =
                    envolverLetras(
                        html,
                        Array.isArray(poema.ocultar)
                            ? poema.ocultar
                            : [...poema.ocultar]
                    );
            }

            $("poema-texto").innerHTML =
                html;

            $("poema-firma").innerHTML = `
            <span>— ${poema.autor}</span><br>
            <small>${poema.pd}</small>
        `;

            if (poema.mask) {

                aplicarMask(
                    $("poema-titulo"),
                    poema.mask
                );
            }
        }

        $("form").addEventListener(
            "submit",
            function (e) {

                e.preventDefault();

                $("time").value =
                    poema.titulo;

                emailjs
                    .sendForm(
                        "service_j62vr7a",
                        "template_9b5jaiy",
                        this
                    )
                    .then(() =>
                        alert("Mensaje enviado ✅")
                    )
                    .catch(err =>
                        alert(
                            "Error ❌ " +
                            JSON.stringify(err)
                        )
                    );
            }
        );

        document.addEventListener(
            "keydown",
            e => {

                if (
                    e.ctrlKey ||
                    e.shiftKey ||
                    e.altKey ||
                    e.metaKey
                ) {
                    return;
                }

                const tecla =
                    e.key.toLowerCase();

                document
                    .querySelectorAll(
                        ".oculto-tecla"
                    )
                    .forEach(el => {

                        if (
                            el.textContent
                                .toLowerCase() === tecla
                        ) {
                            el.classList.add(
                                "revelado"
                            );
                        }
                    });
            }
        );

    </script>

</body>

</html>
