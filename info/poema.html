<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Poema</title>
    <link rel="stylesheet" href="/Riveropedia/css/style.css">
    <link rel="stylesheet" href="/Riveropedia/css/poema.css">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script>(function () { emailjs.init("keJJLe8j0STrmJjvm"); })();</script>

</head>

<body>
    <nav class="topbar">
        <div class="topbar-section left">
            <form id="busqueda-form">
                <input type="text" id="busqueda" placeholder="Buscar..." autocomplete="off">
                <ul id="sugerencias"></ul>
            </form>
        </div>

        <div class="topbar-section center">
            <h1 class="titulo tooltip">
                ♡ N.I.N.A
                <span class="tooltiptext">
                    Neural Interface for Noble Affection
                </span>
            </h1>
        </div>

        <div class="topbar-section right">
            <ul>
                <li><a href="/Riveropedia/index.html">Inicio</a></li>
                <li><a href="/Riveropedia/info/sobre-ti.html">Sobre ti</a></li>
            </ul>
        </div>
    </nav>

    <main class="poema-container">
        <article class="poema-card">
            <span class="poema-fecha" id="poema-fecha"></span>
            <h2 id="poema-titulo"></h2>
            <div class="poema-texto" id="poema-texto"></div>
            <div class="firma" id="poema-firma"></div>
        </article>

        <article class="poema-card">
            <h2>Enviar un mensaje</h2>
            <form id="form">
                <input type="text" name="name" placeholder="Tu nombre" required>
                <input type="email" name="email" placeholder="Tu correo">
                <input type="text" name="title" placeholder="Asunto">
                <textarea name="message" placeholder="Escribe tu mensaje aquí..." required></textarea>
                <input type="hidden" name="time" id="time">
                <button type="submit">Enviar</button>
            </form>
        </article>
    </main>

    <footer>
        <p>© 2026 A. Ssshparro</p>
    </footer>

    <script src="/Riveropedia/js/poemas.js"></script>
    <script src="/Riveropedia/js/secretos.js"></script>
    <script src="/Riveropedia/js/script.js"></script>

    <script>
        const params = new URLSearchParams(window.location.search);
        const fecha = params.get("fecha");
        const poema = poemas[fecha];

        function puedeAbrirse(fechaISO) {
            const [year, month, day] = fechaISO.split("-").map(Number);
            const fechaPoema = new Date(year, month - 1, day);
            const hoy = new Date();
            hoy.setHours(0, 0, 0, 0);
            return fechaPoema <= hoy;
        }

        if (!puedeAbrirse(fecha)) {

            window.location.replace(
                "/Riveropedia/info/tramposa.html?fecha=" +
                encodeURIComponent(fecha)
            );

        } 

        if (!poema) {
            window.location.href = "/Riveropedia/info/pendiente.html";
        } else {
            document.title = poema.titulo;
            document.getElementById("poema-fecha").textContent = poema.fecha;
            document.getElementById("poema-titulo").textContent = poema.titulo;

            const contenedor = document.getElementById("poema-texto");

            poema.estrofas.forEach(
                estrofa => {
                    const p = document.createElement("p");
                    p.innerHTML = estrofa.join("<br>");
                    contenedor.appendChild(p);
                }
            );

            document.getElementById("poema-firma").innerHTML = `
                <span>— ${poema.autor}</span><br>
                <small>${poema.pd}</small>
            `;
        }

        document.getElementById("form").addEventListener("submit", function (e) {
            e.preventDefault();
            document.getElementById("time").value = poema.titulo;
            emailjs.sendForm("service_j62vr7a", "template_9b5jaiy", this)
                .then(() => alert("Mensaje enviado ✅"))
                .catch(err => alert("Error ❌ " + JSON.stringify(err)));
        });
    </script>

</body>

</html>
