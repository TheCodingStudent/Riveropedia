<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Maravillas del Mundo</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="/Riveropedia/css/style.css">
    <link rel="stylesheet" href="/Riveropedia/css/maps.css">

</head>

<body>
    <main class="page-container">

        <header class="page-header">
            <h1>Tu eres mi maravilla del mundo</h1>
            <p>Explora la tierra, sigue las coordenadas, y descubre sus secretos...</p>
        </header>

        <section class="map-section">
            <div id="map"></div>
            <div id="coords">Haz clic en el mapa para ver coordenadas</div>
        </section>
    </main>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="/Riveropedia/js/secretos.js"></script>
    <script src="/Riveropedia/js/script.js"></script>
    <script src="/Riveropedia/js/layout.js"></script>

    <script>
        // Crear mapa centrado en el mundo
        const map = L.map('map').setView([20, 0], 2);
        const objetivoMapa = localStorage.getItem("objetivoMapa");

        // Cargar tiles (mapa base)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            // attribution: '© '
        }).addTo(map);

        // Lista de maravillas con coordenadas y letras
        const maravillas = [
            { nombre: "Gran Muralla China", coords: [40.4319, 116.570], letra: "I", secreto: "Shiganshina",},
            { nombre: "Chichen Itza",       coords: [20.6843, -88.567], letra: "N" },
            { nombre: "Machu Picchu",       coords: [-13.163, -72.545], letra: "D" },
            { nombre: "Petra",              coords: [30.3285, 35.4444], letra: "I" },
            { nombre: "Taj Mahal",          coords: [27.1751, 78.0421], letra: "A" },
            { nombre: "Coliseo Romano",     coords: [41.8902, 12.4922], letra: "N" },
            { nombre: "Cristo Redentor",    coords: [-22.951, -43.210], letra: "A" }
        ];

        // Si existe, buscarlo en la lista de maravillas
        let objetivo = null;
        let objetivoCoords = null;
        let objetivoMarker = null;
        if (objetivoMapa) {
            objetivo = maravillas.find(m => m.nombre === objetivoMapa);
            if (objetivo) {
                objetivoCoords = objetivo.coords;
            }
        }

        if (objetivo) {
            objetivoMarker = L.marker(objetivo.coords);
            objetivoMarker.bindPopup(`<b>${objetivo.nombre}</b><br>Tu objetivo secreto.<br><b style="color: var(--rosa-dark);">${objetivo.letra}</b><br><small>Pd. ${objetivo.secreto}</small>`);

            objetivoMarker.on('click', () => {
                map.setView(objetivo.coords, 10); // acercar al objetivo
                document.getElementById('coords').textContent =
                    `Coordenadas: ${objetivo.coords[0].toFixed(4)}, ${objetivo.coords[1].toFixed(4)}`;
            });

            // Opcional: centrar el mapa en el objetivo al cargar
            // map.setView(objetivo.coords, 4);
        }

        // Mostrar coordenadas al hacer clic en cualquier parte del mapa
        map.on('click', function (e) {
            const lat = e.latlng.lat.toFixed(4);
            const lng = e.latlng.lng.toFixed(4);
            document.getElementById('coords').textContent = `Coordenadas: ${lat}, ${lng}`;
        });

        // Mostrar coordenadas al mover el mouse sobre el mapa
        // Función para calcular distancia en km entre dos coordenadas (lat/lon)
        function distancia(lat1, lon1, lat2, lon2) {
            const R = 6371; // radio de la Tierra en km
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a =
                Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c; // distancia en km
        }

        // Evento hover sobre el mapa
        map.on('mousemove', function (e) {
            const lat = e.latlng.lat;
            const lng = e.latlng.lng;

            const latDir = lat >= 0 ? "N" : "S";
            const lngDir = lng >= 0 ? "E" : "W";
            const latAbs = Math.abs(lat).toFixed(4);
            const lngAbs = Math.abs(lng).toFixed(4);

            let minDist = Infinity;

            // Si hay objetivo definido, calcular solo contra él
            if (objetivoCoords) {
                minDist = distancia(lat, lng, objetivoCoords[0], objetivoCoords[1]);
            } else {
                // Si no hay objetivo, usar todas las maravillas
                maravillas.forEach(m => {
                    const d = distancia(lat, lng, m.coords[0], m.coords[1]);
                    if (d < minDist) minDist = d;
                });
            }

            // Zoom dinámico
            const zoom = map.getZoom();
            const maxDist = 10000 / zoom;
            const ratio = Math.min(minDist / maxDist, 1);

            const r = Math.floor(255 * ratio);
            const g = Math.floor(255 * (1 - ratio));
            const color = `rgb(${r},${g},0)`;

            const coordsEl = document.getElementById('coords');
            coordsEl.textContent = `Coordenadas: ${latAbs}° ${latDir}, ${lngAbs}° ${lngDir} ${ map.getZoom()}`;
            coordsEl.style.color = color;
        });

        map.on('zoomend', () => {
            const zoom = map.getZoom();
            if (objetivoMarker) {
                if (zoom >= 8) { // 👈 ajusta el nivel de zoom mínimo
                    if (!map.hasLayer(objetivoMarker)) {
                        objetivoMarker.addTo(map);
                    }
                } else {
                    if (map.hasLayer(objetivoMarker)) {
                        map.removeLayer(objetivoMarker);
                    }
                }
            }
        });

    </script>
</body>

</html>
