<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para: G. Rivero</title>

    <link rel="stylesheet" href="/Riveropedia/css/style.css">
    <link rel="stylesheet" href="/Riveropedia/css/calendar.css">
</head>

<body data-sherlocked-link="true">

    <section class="selector">
        <label for="mes">Mes</label>
        <div class="selector-wrapper">
            <div class="month-selector">
                <button id="prev-mes" class="month-btn">‹</button>
                <span id="mes-actual">Enero</span>
                <button id="next-mes" class="month-btn">›</button>
            </div>
        </div>
    </section>

    <section class="calendario">
        <div class="calendar-wrapper">
            <div class="dias-semana">
                <span>L</span>
                <span>M</span>
                <span>M</span>
                <span>J</span>
                <span>V</span>
                <span>S</span>
                <span>D</span>
            </div>
            <div id="grid"></div>
        </div>
    </section>

    <script src="/Riveropedia/js/layout.js"></script>
    <script src="/Riveropedia/js/poemas.js"></script>
    <script src="/Riveropedia/js/secretos.js"></script>
    <script src="/Riveropedia/js/calendar.js"></script>
    <script src="/Riveropedia/js/script.js"></script>

</body>

</html>
