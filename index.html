<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para: G. Rivero</title>

    <link rel="stylesheet" href="/Riveropedia/style.css">
</head>

<body>

    <!-- Fondo decorativo -->
    <div class="background-blobs"></div>
    <div class="hearts-layer"></div>

    <!-- NAVBAR -->
    <nav class="topbar">
        <div class="topbar-section left">
            <form id="busqueda-form">
                <input type="text" id="busqueda" placeholder="Buscar..." autocomplete="off">
                <ul id="sugerencias"></ul>
            </form>
        </div>

        <div class="topbar-section center">
            <h1 class="titulo tooltip">
                ♡ N.I.N.A
                <span class="tooltiptext">
                    Neural Interface for Noble Affection
                </span>
            </h1>
        </div>

        <div class="topbar-section right">
            <ul>
                <li>
                    <a href="/Riveropedia/index.html">
                        Inicio
                    </a>
                </li>
                <li>
                    <a href="/Riveropedia/info/sobre-ti.html">
                        Sobre ti
                    </a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Selector -->
    <section class="selector">

        <label for="mes">
            Mes
        </label>

        <div class="selector-wrapper">

            <div class="month-selector">

                <button id="prev-mes" class="month-btn">‹</button>

                <span id="mes-actual">Enero</span>

                <button id="next-mes" class="month-btn">›</button>

            </div>

        </div>

    </section>

    <section class="calendario">

        <div class="calendar-wrapper">

            <div class="dias-semana">

                <span>L</span>
                <span>M</span>
                <span>M</span>
                <span>J</span>
                <span>V</span>
                <span>S</span>
                <span>D</span>

            </div>

            <div id="grid"></div>

        </div>

    </section>

    <!-- Footer -->
    <footer>

        <p>
            © 2026 A. Ssshparro
        </p>

    </footer>

    <script src="/Riveropedia/js/poemas.js"></script>
    <script src="/Riveropedia/js/secretos.js"></script>
    <script src="/Riveropedia/js/script.js"></script>

</body>

</html>
